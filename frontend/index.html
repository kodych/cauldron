<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cauldron — Network Attack Path Discovery</title>
    <meta name="description" content="BloodHound for the network layer. Throw your scans in, get attack paths out." />

    <!-- Favicons: ICO for legacy browsers, PNG for modern HiDPI, SVG for
         infinite scaling on devices that support it. Browsers pick the best
         fit from the declared rel variants. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png" />
    <link rel="icon" type="image/svg+xml" href="/brand/cauldron.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Social / share cards. Points at the pixel-art banner so a paste of
         the repo/app URL into Slack/X/Discord previews as the brand rather
         than as a blank card. -->
    <meta property="og:title" content="Cauldron" />
    <meta property="og:description" content="Network Attack Path Discovery" />
    <meta property="og:image" content="/brand/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="/brand/og-image.png" />
  </head>
  <body class="bg-gray-950 text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
