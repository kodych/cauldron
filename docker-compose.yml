services:
  neo4j:
    image: neo4j:5-community
    container_name: cauldron-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/cauldron
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512M
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  cauldron:
    # Build locally during development; switch to ``image:`` once a tagged
    # image is published to GHCR (release pipeline does this on tag push).
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/kodych/cauldron:latest
    container_name: cauldron
    ports:
      - "8000:8000"
    environment:
      # Talk to the neo4j service via its compose-network DNS name.
      - CAULDRON_NEO4J_URI=bolt://neo4j:7687
      - CAULDRON_NEO4J_USER=neo4j
      - CAULDRON_NEO4J_PASSWORD=cauldron
      # Pull AI / NVD keys from the host environment if set; otherwise the
      # AI phases just skip gracefully.
      - CAULDRON_ANTHROPIC_API_KEY=${CAULDRON_ANTHROPIC_API_KEY:-}
      - CAULDRON_NVD_API_KEY=${CAULDRON_NVD_API_KEY:-}
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
