# Default/known credentials database for Cauldron
# Source: DefaultCreds-cheat-sheet (curated subset for pentesting)
# Format: product patterns → list of username:password pairs
#
# Rules:
# - Only include credentials useful for network pentesting
# - product_regex matches service product field (case-insensitive)
# - ports restrict matching to specific ports (optional)
# - <blank> means empty string
# - Ordered by likelihood of success

- product_regex: "postgresql|postgres"
  ports: [5432]
  creds:
    - ["postgres", ""]
    - ["postgres", "postgres"]
    - ["admin", "admin"]
    - ["admin", "password"]

- product_regex: "mysql|mariadb"
  ports: [3306]
  creds:
    - ["root", ""]
    - ["root", "root"]
    - ["root", "mysql"]
    - ["admin", "admin"]

- product_regex: "mssql|sql.server|ms-sql"
  ports: [1433, 55299]
  creds:
    - ["sa", ""]
    - ["sa", "sa"]
    - ["sa", "Password123"]
    - ["sa", "RPSsql12345"]

